name: Build AutoExpert APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - uses: android-actions/setup-android@v3
      - name: Create google-services.json
        run: echo '{"project_info":{"project_number":"592413979133","project_id":"autoexpert-40900","storage_bucket":"autoexpert-40900.firebasestorage.app"},"client":[{"client_info":{"mobilesdk_app_id":"1:592413979133:android:69fa72fa0a1f5699c9e994","android_client_info":{"package_name":"com.autoexpert.app"}},"oauth_client":[],"api_key":[{"current_key":"AIzaSyAfcpp5BOGA-p5cwcjvdt_8l0F0iGs6f5k"}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}}],"configuration_version":"1"}' > app/google-services.json
      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AutoExpert-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
